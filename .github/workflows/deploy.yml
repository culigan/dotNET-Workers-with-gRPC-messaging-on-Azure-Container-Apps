name: Build and deploy .NET application to Container App silo

on:
  push:
    branches:
    - deploy

env:
  
  # alphanumeric string under 14 characters
  RESOURCE_GROUP_NAME: collingrpc

  # specify your preferred region
  REGION: eastus

  FRONTEND_DOCKER: Frontend/Dockerfile
  FRONTEND_IMAGE: frontend

  WORKER_DOCKER: SensorWorker/Dockerfile
  WORKER_IMAGE: worker

  SERVICE_DOCKER: SensorService/Dockerfile 
  SERVICE_IMAGE: service

jobs:
  provision:
    runs-on: ubuntu-latest

    steps:

    - name: Checkout to the branch
      uses: actions/checkout@v2

    - name: Azure Login
      uses: azure/login@v1
      with:
        creds: ${{ secrets.AzureSPN }}

    - name: Create resource group
      uses: azure/CLI@v1
      with:
        inlineScript: >
          echo "Creating resource group in Azure"
          echo "Executing 'az group create -l ${{ env.REGION }} -n ${{ env.RESOURCE_GROUP_NAME }}'"

          az group create -l ${{ env.REGION }} -n ${{ env.RESOURCE_GROUP_NAME }}

    - name: Creating resources
      uses: azure/CLI@v1
      with:
        inlineScript: >
          echo "Creating resources"

          az deployment group create --resource-group ${{ env.RESOURCE_GROUP_NAME }} --template-file '/github/workspace/Azure/main.bicep' --debug

  build:
    runs-on: ubuntu-latest
    needs: provision
    
    steps:

    - name: Checkout to the branch
      uses: actions/checkout@v2

    - name: Azure Login
      uses: azure/login@v1
      with:
        creds: ${{ secrets.AzureSPN }}

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v1

    - name: Login to ACR
      run: |
        set -euo pipefail
        access_token=$(az account get-access-token --query accessToken -o tsv)
        refresh_token=$(curl https://${{ env.RESOURCE_GROUP_NAME }}acr.azurecr.io/oauth2/exchange -v -d "grant_type=access_token&service=${{ env.RESOURCE_GROUP_NAME }}acr.azurecr.io&access_token=$access_token" | jq -r .refresh_token)
        docker login -u 00000000-0000-0000-0000-000000000000 --password-stdin ${{ env.RESOURCE_GROUP_NAME }}acr.azurecr.io <<< "$refresh_token"

    - name: Build the service image and push it to ACR
      uses: docker/build-push-action@v2
      with:
        push: true
        tags: ${{ env.RESOURCE_GROUP_NAME }}acr.azurecr.io/${{ env.SERVICE_IMAGE }}:${{ github.sha }}
        file: ${{ env.SERVICE_DOCKER }}

    - name: Build the front end image and push it to ACR
      uses: docker/build-push-action@v2
      with:
        push: true
        tags: ${{ env.RESOURCE_GROUP_NAME }}acr.azurecr.io/${{ env.FRONTEND_IMAGE }}:${{ github.sha }}
        file: ${{ env.FRONTEND_DOCKER }}

    - name: Build the worker image and push it to ACR
      uses: docker/build-push-action@v2
      with:
        push: true
        tags: ${{ env.RESOURCE_GROUP_NAME }}acr.azurecr.io/${{ env.WORKER_IMAGE }}:${{ github.sha }}
        file: ${{ env.WORKER_DOCKER }}

  deploy:
    runs-on: ubuntu-latest
    needs: build
  
    steps:
      - name: Checkout
        uses: actions/checkout@v3
  
      - name: Azure Login
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AzureSPN }}
  
      # SERVICE
      - name: Deploy Service App
        uses: azure/container-apps-deploy-action@v1
        with:
          resourceGroup: ${{ env.RESOURCE_GROUP_NAME }}
          containerAppName: service
          acrName: ${{ env.RESOURCE_GROUP_NAME }}acr
          imageToDeploy: ${{ env.RESOURCE_GROUP_NAME }}acr.azurecr.io/${{ env.SERVICE_IMAGE }}:${{ github.sha }}
  
      # FRONTEND
      - name: Deploy Frontend App
        uses: azure/container-apps-deploy-action@v1
        with:
          resourceGroup: ${{ env.RESOURCE_GROUP_NAME }}
          containerAppName: frontend
          acrName: ${{ env.RESOURCE_GROUP_NAME }}acr
          imageToDeploy: ${{ env.RESOURCE_GROUP_NAME }}acr.azurecr.io/${{ env.FRONTEND_IMAGE }}:${{ github.sha }}
  
      # WORKER
      - name: Deploy Worker App
        uses: azure/container-apps-deploy-action@v1
        with:
          resourceGroup: ${{ env.RESOURCE_GROUP_NAME }}
          containerAppName: worker
          acrName: ${{ env.RESOURCE_GROUP_NAME }}acr
          imageToDeploy: ${{ env.RESOURCE_GROUP_NAME }}acr.azurecr.io/${{ env.WORKER_IMAGE }}:${{ github.sha }}
